<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>VitalPets — Inventario</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f9fcfb;
        color: #2d2d2d;
      }
      header {
        background: #78c4a7;
        padding: 18px 40px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      header h1 {
        color: #fff;
        font-size: 1.6rem;
        font-weight: 700;
      }
      main {
        max-width: 1000px;
        margin: 36px auto;
        padding: 0 20px;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 28px 32px;
        box-shadow: 0 2px 12px rgba(120, 196, 167, 0.15);
        margin-bottom: 32px;
        border-top: 4px solid #78c4a7;
      }
      .card h2 {
        color: #78c4a7;
        margin-bottom: 20px;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      label {
        font-size: 0.82rem;
        font-weight: 600;
        color: #555;
        text-transform: uppercase;
      }
      input,
      select {
        padding: 10px 14px;
        border: 1.5px solid #ceeadf;
        border-radius: 8px;
        font-size: 0.95rem;
        background: #f9fcfb;
        outline: none;
      }
      input:focus,
      select:focus {
        border-color: #78c4a7;
        background: #fff;
      }
      .btn {
        background: #78c4a7;
        color: #fff;
        border: none;
        padding: 12px 28px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
      }
      .btn:hover {
        background: #5aab8e;
      }
      .btn-danger {
        background: #e57373;
        color: #fff;
        border: none;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.82rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88rem;
      }
      thead tr {
        background: #ceeadf;
      }
      thead th {
        padding: 12px 14px;
        text-align: left;
        color: #2d6b55;
        font-size: 0.78rem;
        text-transform: uppercase;
      }
      tbody tr {
        border-bottom: 1px solid #f4f4f2;
      }
      tbody td {
        padding: 10px 14px;
      }
      .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 700;
        background: #ceeadf;
        color: #2d6b55;
      }
      .badge-alerta {
        background: #fde8e8;
        color: #c0392b;
      }
      #msg {
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 12px;
        display: none;
      }
      .ok {
        background: #ceeadf;
        color: #2d6b55;
        display: block !important;
      }
      .err {
        background: #fde8e8;
        color: #c0392b;
        display: block !important;
      }
    </style>
  </head>
  <body>
    <header>
      <span>📦</span>
      <h1>VitalPets — Control de Inventario</h1>
    </header>
    <main>
      <div class="card">
        <h2>➕ Registrar Producto / Medicamento</h2>
        <div id="msg"></div>
        <div class="form-grid">
          <div class="form-group">
            <label>Nombre</label
            ><input id="i-nombre" placeholder="Ej: Amoxicilina 500mg" />
          </div>
          <div class="form-group">
            <label>Categoría</label>
            <select id="i-categoria">
              <option value="MEDICAMENTO">Medicamento</option>
              <option value="HERRAMIENTA">Herramienta</option>
              <option value="ACCESORIO">Accesorio</option>
              <option value="ALIMENTO">Alimento</option>
              <option value="HIGIENE">Higiene</option>
              <option value="OTRO">Otro</option>
            </select>
          </div>
          <div class="form-group">
            <label>Stock Actual</label
            ><input type="number" id="i-stock" min="0" placeholder="Ej: 50" />
          </div>
          <div class="form-group">
            <label>Stock Mínimo</label
            ><input type="number" id="i-min" min="0" placeholder="Ej: 10" />
          </div>
          <div class="form-group">
            <label>Precio Unitario ($)</label
            ><input
              type="number"
              id="i-precio"
              step="0.01"
              placeholder="Ej: 5990"
            />
          </div>
          <div class="form-group">
            <label>Unidad de Medida</label
            ><input id="i-unidad" placeholder="Ej: caja, unidad, ml" />
          </div>
          <div class="form-group" style="grid-column: span 2">
            <label>Descripción</label
            ><input
              id="i-desc"
              placeholder="Ej: Antibiótico de amplio espectro"
            />
          </div>
        </div>
        <button class="btn" onclick="registrar()">Registrar Producto</button>
      </div>
      <div class="card">
        <h2>📋 Inventario Actual</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Stock</th>
              <th>Mínimo</th>
              <th>Precio</th>
              <th>Estado</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="tablaInventario">
            <tr>
              <td
                colspan="8"
                style="text-align: center; color: #aaa; padding: 20px"
              >
                Sin productos registrados.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
    <script>
      const API = "http://localhost:8085/api/inventario";
      window.onload = () => cargar();

      async function registrar() {
        const msg = document.getElementById("msg");
        const body = {
          nombre: document.getElementById("i-nombre").value,
          descripcion: document.getElementById("i-desc").value,
          categoria: document.getElementById("i-categoria").value,
          stockActual: parseInt(document.getElementById("i-stock").value),
          stockMinimo: parseInt(document.getElementById("i-min").value),
          precioUnitario: parseFloat(document.getElementById("i-precio").value),
          unidadMedida: document.getElementById("i-unidad").value,
        };
        try {
          const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (res.ok) {
            msg.className = "ok";
            msg.textContent = "✅ Producto registrado exitosamente.";
            cargar();
          } else {
            msg.className = "err";
            msg.textContent = "❌ Error al registrar.";
          }
        } catch (e) {
          msg.className = "err";
          msg.textContent = "❌ Sin conexión al servidor.";
        }
      }

      async function cargar() {
        const tbody = document.getElementById("tablaInventario");
        try {
          const data = await (await fetch(API)).json();
          if (!data.length) return;
          tbody.innerHTML = data
            .map(
              (p) => `<tr>
                <td>${p.id}</td>
                <td><strong>${p.nombre}</strong></td>
                <td><span class="badge">${p.categoria}</span></td>
                <td>${p.stockActual} ${p.unidadMedida || ""}</td>
                <td>${p.stockMinimo}</td>
                <td>$${p.precioUnitario.toLocaleString()}</td>
                <td>${
                  p.stockBajo
                    ? '<span class="badge badge-alerta">⚠️ Stock Bajo</span>'
                    : '<span class="badge">✅ OK</span>'
                }</td>
                <td><button class="btn-danger" onclick="desactivar(${p.id})">Eliminar</button></td>
            </tr>`,
            )
            .join("");
        } catch (e) {
          console.error(e);
        }
      }

      async function desactivar(id) {
        if (!confirm("¿Eliminar este producto?")) return;
        await fetch(`${API}/${id}`, { method: "DELETE" });
        cargar();
      }
    </script>
  </body>
</html>
