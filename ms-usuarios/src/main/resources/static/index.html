<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>VitalPets — Usuarios</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f9fcfb;
        color: #2d2d2d;
      }
      header {
        background: #78c4a7;
        padding: 18px 40px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      header h1 {
        color: #fff;
        font-size: 1.6rem;
        font-weight: 700;
      }
      main {
        max-width: 960px;
        margin: 36px auto;
        padding: 0 20px;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 28px 32px;
        box-shadow: 0 2px 12px rgba(120, 196, 167, 0.15);
        margin-bottom: 32px;
        border-top: 4px solid #78c4a7;
      }
      .card h2 {
        color: #78c4a7;
        margin-bottom: 20px;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      label {
        font-size: 0.82rem;
        font-weight: 600;
        color: #555;
        text-transform: uppercase;
      }
      input,
      select {
        padding: 10px 14px;
        border: 1.5px solid #ceeadf;
        border-radius: 8px;
        font-size: 0.95rem;
        background: #f9fcfb;
        outline: none;
      }
      input:focus,
      select:focus {
        border-color: #78c4a7;
        background: #fff;
      }
      .btn {
        background: #78c4a7;
        color: #fff;
        border: none;
        padding: 12px 28px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
      }
      .btn:hover {
        background: #5aab8e;
      }
      .btn-danger {
        background: #e57373;
        color: #fff;
        border: none;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.82rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }
      thead tr {
        background: #ceeadf;
      }
      thead th {
        padding: 12px 14px;
        text-align: left;
        color: #2d6b55;
        font-size: 0.78rem;
        text-transform: uppercase;
      }
      tbody tr {
        border-bottom: 1px solid #f4f4f2;
      }
      tbody td {
        padding: 11px 14px;
      }
      .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 700;
        background: #ceeadf;
        color: #2d6b55;
      }
      #msg {
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 12px;
        display: none;
      }
      .ok {
        background: #ceeadf;
        color: #2d6b55;
        display: block !important;
      }
      .err {
        background: #fde8e8;
        color: #c0392b;
        display: block !important;
      }
    </style>
  </head>
  <body>
    <header>
      <span>🔐</span>
      <h1>VitalPets — Gestión de Usuarios</h1>
    </header>
    <main>
      <div class="card">
        <h2>➕ Registrar Usuario</h2>
        <div id="msg"></div>
        <div class="form-grid">
          <div class="form-group">
            <label>Nombre Completo</label
            ><input id="u-nombre" placeholder="Ej: Ana Torres" />
          </div>
          <div class="form-group">
            <label>Username</label
            ><input id="u-username" placeholder="Ej: ana.torres" />
          </div>
          <div class="form-group">
            <label>Contraseña</label><input id="u-pass" type="password" />
          </div>
          <div class="form-group">
            <label>Rol</label>
            <select id="u-rol">
              <option value="ADMIN">Admin</option>
              <option value="VETERINARIO">Veterinario</option>
              <option value="RECEPCIONISTA">Recepcionista</option>
              <option value="ESTILISTA">Estilista</option>
              <option value="LABORATORISTA">Laboratorista</option>
            </select>
          </div>
        </div>
        <button class="btn" onclick="registrar()">Registrar Usuario</button>
      </div>
      <div class="card">
        <h2>📋 Usuarios del Sistema</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Nombre</th>
              <th>Rol</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="tablaUsuarios">
            <tr>
              <td
                colspan="5"
                style="text-align: center; color: #aaa; padding: 20px"
              >
                Sin usuarios registrados.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
    <script>
      const API = "http://localhost:8090/api/usuarios";
      window.onload = () => cargar();

      async function registrar() {
        const msg = document.getElementById("msg");
        const body = {
          nombreCompleto: document.getElementById("u-nombre").value,
          username: document.getElementById("u-username").value,
          password: document.getElementById("u-pass").value,
          rol: document.getElementById("u-rol").value,
        };
        try {
          const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (res.ok) {
            msg.className = "ok";
            msg.textContent = "✅ Usuario registrado exitosamente.";
            cargar();
          } else {
            msg.className = "err";
            msg.textContent = "❌ Error al registrar.";
          }
        } catch (e) {
          msg.className = "err";
          msg.textContent = "❌ Sin conexión al servidor.";
        }
      }

      async function cargar() {
        const tbody = document.getElementById("tablaUsuarios");
        try {
          const data = await (await fetch(API)).json();
          if (!data.length) return;
          tbody.innerHTML = data
            .map(
              (u) => `<tr>
                <td>${u.id}</td><td>${u.username}</td>
                <td>${u.nombreCompleto}</td>
                <td><span class="badge">${u.rol}</span></td>
                <td><button class="btn-danger" onclick="desactivar(${u.id})">Dar de baja</button></td>
            </tr>`,
            )
            .join("");
        } catch (e) {
          console.error(e);
        }
      }

      async function desactivar(id) {
        if (!confirm("¿Dar de baja este usuario?")) return;
        await fetch(`${API}/${id}`, { method: "DELETE" });
        cargar();
      }
    </script>
  </body>
</html>
