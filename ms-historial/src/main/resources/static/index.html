<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>VitalPets — Historial</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f9fcfb;
        color: #2d2d2d;
      }
      header {
        background: #78c4a7;
        padding: 18px 40px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      header h1 {
        color: #fff;
        font-size: 1.6rem;
        font-weight: 700;
      }
      main {
        max-width: 1000px;
        margin: 36px auto;
        padding: 0 20px;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 28px 32px;
        box-shadow: 0 2px 12px rgba(120, 196, 167, 0.15);
        margin-bottom: 32px;
        border-top: 4px solid #78c4a7;
      }
      .card h2 {
        color: #78c4a7;
        margin-bottom: 20px;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .form-group.full {
        grid-column: span 2;
      }
      label {
        font-size: 0.82rem;
        font-weight: 600;
        color: #555;
        text-transform: uppercase;
      }
      input,
      select,
      textarea {
        padding: 10px 14px;
        border: 1.5px solid #ceeadf;
        border-radius: 8px;
        font-size: 0.95rem;
        background: #f9fcfb;
        outline: none;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: #78c4a7;
        background: #fff;
      }
      textarea {
        resize: vertical;
        min-height: 80px;
      }
      .btn {
        background: #78c4a7;
        color: #fff;
        border: none;
        padding: 12px 28px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
      }
      .btn:hover {
        background: #5aab8e;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88rem;
      }
      thead tr {
        background: #ceeadf;
      }
      thead th {
        padding: 12px 14px;
        text-align: left;
        color: #2d6b55;
        font-size: 0.78rem;
        text-transform: uppercase;
      }
      tbody tr {
        border-bottom: 1px solid #f4f4f2;
      }
      tbody td {
        padding: 10px 14px;
      }
      .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 700;
        background: #ceeadf;
        color: #2d6b55;
      }
      #msg {
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 12px;
        display: none;
      }
      .ok {
        background: #ceeadf;
        color: #2d6b55;
        display: block !important;
      }
      .err {
        background: #fde8e8;
        color: #c0392b;
        display: block !important;
      }
    </style>
  </head>
  <body>
    <header>
      <button onclick="window.history.back()" style="background:#fff;color:#78c4a7;border:none;border-radius:10px;padding:8px 16px;font-size:0.9rem;font-weight:600;cursor:pointer;flex-shrink:0;" onmouseover="this.style.background='#e8f8f2'" onmouseout="this.style.background='#fff'">← Volver</button>
      <span>📋</span>
      <h1>VitalPets — Historial Médico</h1>
    </header>
    <main>
      <div class="card">
        <h2>➕ Registrar Evento Médico</h2>
        <div id="msg"></div>
        <div class="form-grid">
          <div class="form-group">
            <label>ID Mascota</label
            ><input type="number" id="h-mascota" placeholder="Ej: 1" />
          </div>
          <div class="form-group">
            <label>ID Cliente</label
            ><input type="number" id="h-cliente" placeholder="Ej: 1" />
          </div>
          <div class="form-group">
            <label>ID Personal</label
            ><input type="number" id="h-personal" placeholder="Ej: 1" />
          </div>
          <div class="form-group">
            <label>ID Cita (opcional)</label
            ><input type="number" id="h-cita" placeholder="Ej: 1" />
          </div>
          <div class="form-group">
            <label>Tipo Evento</label>
            <select id="h-tipo">
              <option value="CONSULTA">Consulta</option>
              <option value="CIRUGIA">Cirugía</option>
              <option value="VACUNACION">Vacunación</option>
              <option value="DESPARASITACION">Desparasitación</option>
              <option value="PELUQUERIA">Peluquería</option>
              <option value="LABORATORIO">Laboratorio</option>
              <option value="CONTROL">Control</option>
              <option value="OTRO">Otro</option>
            </select>
          </div>
          <div class="form-group">
            <label>Quien Trajo la Mascota</label
            ><input id="h-quien" placeholder="Ej: Juan Pérez (dueño)" />
          </div>
          <div class="form-group full">
            <label>Descripción</label
            ><textarea
              id="h-desc"
              placeholder="Descripción del evento..."
            ></textarea>
          </div>
          <div class="form-group full">
            <label>Diagnóstico</label
            ><textarea
              id="h-diag"
              placeholder="Diagnóstico veterinario..."
            ></textarea>
          </div>
          <div class="form-group">
            <label>Tratamiento</label
            ><input id="h-trat" placeholder="Ej: Reposo 3 días" />
          </div>
          <div class="form-group">
            <label>Medicamentos Recetados</label
            ><input id="h-med" placeholder="Ej: Amoxicilina 500mg cada 8h" />
          </div>
          <div class="form-group full">
            <label>Próxima Visita</label
            ><input id="h-prox" placeholder="Ej: En 15 días para control" />
          </div>
        </div>
        <button class="btn" onclick="registrar()">
          Registrar en Historial
        </button>
      </div>
      <div class="card">
        <h2>📋 Historial Médico</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Mascota</th>
              <th>Tipo</th>
              <th>Fecha</th>
              <th>Diagnóstico</th>
              <th>Próxima Visita</th>
            </tr>
          </thead>
          <tbody id="tablaHistorial">
            <tr>
              <td
                colspan="6"
                style="text-align: center; color: #aaa; padding: 20px"
              >
                Sin registros.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
    <script>
      const API = "http://localhost:8084/api/historial";
      window.onload = () => cargar();

      async function registrar() {
        const msg = document.getElementById("msg");
        const citaVal = document.getElementById("h-cita").value;
        const body = {
          mascotaId: parseInt(document.getElementById("h-mascota").value),
          clienteId: parseInt(document.getElementById("h-cliente").value),
          personalId: parseInt(document.getElementById("h-personal").value),
          citaId: citaVal ? parseInt(citaVal) : null,
          tipoEvento: document.getElementById("h-tipo").value,
          descripcion: document.getElementById("h-desc").value,
          diagnostico: document.getElementById("h-diag").value,
          tratamiento: document.getElementById("h-trat").value,
          medicamentosRecetados: document.getElementById("h-med").value,
          proximaVisita: document.getElementById("h-prox").value,
          nombreQuienTrajo: document.getElementById("h-quien").value,
        };
        try {
          const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (res.ok) {
            msg.className = "ok";
            msg.textContent = "✅ Evento registrado en historial.";
            cargar();
          } else {
            msg.className = "err";
            msg.textContent = "❌ Error al registrar.";
          }
        } catch (e) {
          msg.className = "err";
          msg.textContent = "❌ Sin conexión al servidor.";
        }
      }

      async function cargar() {
        const tbody = document.getElementById("tablaHistorial");
        try {
          const data = await (await fetch(API)).json();
          if (!data.length) return;
          tbody.innerHTML = data
            .map(
              (h) => `<tr>
                <td>${h.id}</td>
                <td>ID: ${h.mascotaId}</td>
                <td><span class="badge">${h.tipoEvento}</span></td>
                <td>${new Date(h.fechaEvento).toLocaleDateString("es-CL")}</td>
                <td style="font-size:.82rem">${h.diagnostico || "-"}</td>
                <td style="font-size:.82rem">${h.proximaVisita || "-"}</td>
            </tr>`,
            )
            .join("");
        } catch (e) {
          console.error(e);
        }
      }
    </script>
  </body>
</html>
