<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>VitalPets — Citas</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f9fcfb;
        color: #2d2d2d;
      }
      header {
        background: #78c4a7;
        padding: 18px 40px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      header h1 {
        color: #fff;
        font-size: 1.6rem;
        font-weight: 700;
      }
      main {
        max-width: 1000px;
        margin: 36px auto;
        padding: 0 20px;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 28px 32px;
        box-shadow: 0 2px 12px rgba(120, 196, 167, 0.15);
        margin-bottom: 32px;
        border-top: 4px solid #78c4a7;
      }
      .card h2 {
        color: #78c4a7;
        margin-bottom: 20px;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .form-group.full {
        grid-column: span 2;
      }
      label {
        font-size: 0.82rem;
        font-weight: 600;
        color: #555;
        text-transform: uppercase;
      }
      input,
      select,
      textarea {
        padding: 10px 14px;
        border: 1.5px solid #ceeadf;
        border-radius: 8px;
        font-size: 0.95rem;
        background: #f9fcfb;
        outline: none;
      }
      input:focus,
      select:focus {
        border-color: #78c4a7;
        background: #fff;
      }
      .btn {
        background: #78c4a7;
        color: #fff;
        border: none;
        padding: 12px 28px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
      }
      .btn:hover {
        background: #5aab8e;
      }
      .btn-danger {
        background: #e57373;
        color: #fff;
        border: none;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.82rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88rem;
      }
      thead tr {
        background: #ceeadf;
      }
      thead th {
        padding: 12px 14px;
        text-align: left;
        color: #2d6b55;
        font-size: 0.78rem;
        text-transform: uppercase;
      }
      tbody tr {
        border-bottom: 1px solid #f4f4f2;
      }
      tbody td {
        padding: 10px 14px;
      }
      .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 700;
        background: #ceeadf;
        color: #2d6b55;
      }
      .badge-prog {
        background: #fff3cd;
        color: #856404;
      }
      .badge-comp {
        background: #d1fae5;
        color: #065f46;
      }
      .badge-canc {
        background: #fde8e8;
        color: #c0392b;
      }
      #msg {
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 12px;
        display: none;
      }
      .ok {
        background: #ceeadf;
        color: #2d6b55;
        display: block !important;
      }
      .err {
        background: #fde8e8;
        color: #c0392b;
        display: block !important;
      }
    </style>
  </head>
  <body>
    <header>
      <button onclick="window.history.back()" style="background:#fff;color:#78c4a7;border:none;border-radius:10px;padding:8px 16px;font-size:0.9rem;font-weight:600;cursor:pointer;flex-shrink:0;" onmouseover="this.style.background='#e8f8f2'" onmouseout="this.style.background='#fff'">← Volver</button>
      <span>📅</span>
      <h1>VitalPets — Gestión de Citas</h1>
    </header>
    <main>
      <div class="card">
        <h2>➕ Registrar Nueva Cita</h2>
        <div id="msg"></div>
        <div class="form-grid">
          <div class="form-group">
            <label>ID Mascota</label
            ><input type="number" id="c-mascota" placeholder="Ej: 1" />
          </div>
          <div class="form-group">
            <label>ID Cliente (Dueño)</label
            ><input type="number" id="c-cliente" placeholder="Ej: 1" />
          </div>
          <div class="form-group">
            <label>ID Personal Asignado</label
            ><input type="number" id="c-personal" placeholder="Ej: 1" />
          </div>
          <div class="form-group">
            <label>Quien Trae la Mascota</label
            ><input id="c-quien" placeholder="Ej: María López (familiar)" />
          </div>
          <div class="form-group">
            <label>Fecha y Hora</label
            ><input type="datetime-local" id="c-fecha" />
          </div>
          <div class="form-group">
            <label>Tipo de Servicio</label>
            <select id="c-servicio">
              <option value="CONSULTA_GENERAL">Consulta General</option>
              <option value="CIRUGIA">Cirugía</option>
              <option value="PELUQUERIA">Peluquería</option>
              <option value="BANO">Baño</option>
              <option value="CORTE_UNAS">Corte de Uñas</option>
              <option value="DESPARASITACION">Desparasitación</option>
              <option value="VACUNACION">Vacunación</option>
              <option value="LABORATORIO">Laboratorio</option>
              <option value="CONTROL">Control</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Observaciones</label>
            <input
              id="c-obs"
              placeholder="Ej: Mascota con alergia a la penicilina"
            />
          </div>
        </div>
        <button class="btn" onclick="registrar()">Agendar Cita</button>
      </div>
      <div class="card">
        <h2>📋 Citas Registradas</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Mascota</th>
              <th>Cliente</th>
              <th>Servicio</th>
              <th>Fecha/Hora</th>
              <th>Quien Trae</th>
              <th>Estado</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="tablaCitas">
            <tr>
              <td
                colspan="8"
                style="text-align: center; color: #aaa; padding: 20px"
              >
                Sin citas registradas.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
    <script>
      const API = "http://localhost:8083/api/citas";
      window.onload = () => cargar();

      async function registrar() {
        const msg = document.getElementById("msg");
        const body = {
          mascotaId: parseInt(document.getElementById("c-mascota").value),
          clienteId: parseInt(document.getElementById("c-cliente").value),
          personalId: parseInt(document.getElementById("c-personal").value),
          nombreQuienTrae: document.getElementById("c-quien").value,
          fechaHora: document.getElementById("c-fecha").value,
          tipoServicio: document.getElementById("c-servicio").value,
          observaciones: document.getElementById("c-obs").value,
        };
        try {
          const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (res.ok) {
            msg.className = "ok";
            msg.textContent = "✅ Cita agendada exitosamente.";
            cargar();
          } else {
            msg.className = "err";
            msg.textContent = "❌ Error al agendar. Verifica los campos.";
          }
        } catch (e) {
          msg.className = "err";
          msg.textContent = "❌ Sin conexión al servidor.";
        }
      }

      function badgeEstado(e) {
        const clases = {
          PROGRAMADA: "badge-prog",
          CONFIRMADA: "badge",
          EN_CURSO: "badge",
          COMPLETADA: "badge-comp",
          CANCELADA: "badge-canc",
        };
        return `<span class="badge ${clases[e] || "badge"}">${e}</span>`;
      }

      async function cargar() {
        const tbody = document.getElementById("tablaCitas");
        try {
          const data = await (await fetch(API)).json();
          if (!data.length) return;
          tbody.innerHTML = data
            .map(
              (c) => `<tr>
                <td>${c.id}</td>
                <td>ID: ${c.mascotaId}</td>
                <td>ID: ${c.clienteId}</td>
                <td><span class="badge">${c.tipoServicio.replace(/_/g, " ")}</span></td>
                <td>${new Date(c.fechaHora).toLocaleString("es-CL")}</td>
                <td>${c.nombreQuienTrae || "-"}</td>
                <td>${badgeEstado(c.estado)}</td>
                <td><button class="btn-danger" onclick="cancelar(${c.id})">Cancelar</button></td>
            </tr>`,
            )
            .join("");
        } catch (e) {
          console.error(e);
        }
      }

      async function cancelar(id) {
        if (!confirm("¿Cancelar esta cita?")) return;
        await fetch(`${API}/${id}`, { method: "DELETE" });
        cargar();
      }
    </script>
  </body>
</html>
