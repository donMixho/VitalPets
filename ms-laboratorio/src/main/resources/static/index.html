<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <title>VitalPets — Laboratorio</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#F9FCFB;color:#2d2d2d}
        header{background:#78C4A7;padding:18px 40px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
        header h1{color:#fff;font-size:1.6rem;font-weight:700}
        main{max-width:1000px;margin:36px auto;padding:0 20px}
        .card{background:#fff;border-radius:12px;padding:28px 32px;box-shadow:0 2px 12px rgba(120,196,167,.15);margin-bottom:32px;border-top:4px solid #78C4A7}
        .card h2{color:#78C4A7;margin-bottom:20px;font-size:1rem;text-transform:uppercase;letter-spacing:1px}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .form-group{display:flex;flex-direction:column;gap:6px}
        .form-group.full{grid-column:span 2}
        label{font-size:.82rem;font-weight:600;color:#555;text-transform:uppercase}
        input,select,textarea{padding:10px 14px;border:1.5px solid #CEEADF;border-radius:8px;font-size:.95rem;background:#F9FCFB;outline:none}
        input:focus,select:focus,textarea:focus{border-color:#78C4A7;background:#fff}
        textarea{resize:vertical;min-height:80px}
        .btn{background:#78C4A7;color:#fff;border:none;padding:12px 28px;border-radius:8px;font-weight:600;cursor:pointer;margin-top:8px}
        .btn:hover{background:#5aab8e}
        table{width:100%;border-collapse:collapse;font-size:.88rem}
        thead tr{background:#CEEADF}
        thead th{padding:12px 14px;text-align:left;color:#2d6b55;font-size:.78rem;text-transform:uppercase}
        tbody tr{border-bottom:1px solid #F4F4F2}
        tbody td{padding:10px 14px}
        .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700;background:#CEEADF;color:#2d6b55}
        .badge-urg{background:#fde8e8;color:#c0392b}
        .badge-comp{background:#d1fae5;color:#065f46}
        #msg{padding:10px;border-radius:8px;margin-bottom:12px;display:none}
        .ok{background:#CEEADF;color:#2d6b55;display:block!important}
        .err{background:#fde8e8;color:#c0392b;display:block!important}
    </style>
</head>
<body>
<header style="display:flex;align-items:center;gap:14px;"><button onclick="window.history.back()" style="background:#fff;color:#78c4a7;border:none;border-radius:10px;padding:8px 16px;font-size:0.9rem;font-weight:600;cursor:pointer;flex-shrink:0;" onmouseover="this.style.background='#e8f8f2'" onmouseout="this.style.background='#fff'">← Volver</button><span>🔬</span><h1>VitalPets — Laboratorio Clínico</h1></header>
<main>
    <div class="card">
        <h2>➕ Solicitar Examen</h2>
        <div id="msg"></div>
        <div class="form-grid">
            <div class="form-group"><label>ID Mascota</label><input type="number" id="e-mascota" placeholder="Ej: 1"/></div>
            <div class="form-group"><label>ID Cliente</label><input type="number" id="e-cliente" placeholder="Ej: 1"/></div>
            <div class="form-group"><label>ID Personal</label><input type="number" id="e-personal" placeholder="Ej: 1"/></div>
            <div class="form-group"><label>ID Cita (opcional)</label><input type="number" id="e-cita" placeholder="Ej: 1"/></div>
            <div class="form-group"><label>Tipo Examen</label>
                <select id="e-tipo">
                    <option value="HEMOGRAMA">Hemograma</option>
                    <option value="BIOQUIMICA">Bioquímica</option>
                    <option value="URINALISIS">Urianálisis</option>
                    <option value="CULTIVO">Cultivo</option>
                    <option value="RADIOGRAFIA">Radiografía</option>
                    <option value="ECOGRAFIA">Ecografía</option>
                    <option value="BIOPSIA">Biopsia</option>
                    <option value="PARASITOLOGIA">Parasitología</option>
                    <option value="OTRO">Otro</option>
                </select>
            </div>
            <div class="form-group" style="justify-content:flex-end;padding-bottom:4px">
                <label>¿Urgente?</label>
                <select id="e-urgente">
                    <option value="false">No</option>
                    <option value="true">Sí — URGENTE</option>
                </select>
            </div>
        </div>
        <button class="btn" onclick="solicitar()">Solicitar Examen</button>
    </div>
    <div class="card">
        <h2>📋 Exámenes Registrados</h2>
        <table>
            <thead><tr><th>ID</th><th>Mascota</th><th>Tipo</th><th>Estado</th><th>Urgente</th><th>Solicitud</th><th>Resultado</th></tr></thead>
            <tbody id="tablaExamenes"><tr><td colspan="7" style="text-align:center;color:#aaa;padding:20px">Sin registros.</td></tr></tbody>
        </table>
    </div>
</main>
<script>
    const API = 'http://localhost:8089/api/laboratorio';
    window.onload = () => cargar();

    async function solicitar() {
        const msg = document.getElementById('msg');
        const citaVal = document.getElementById('e-cita').value;
        const body = {
            mascotaId: parseInt(document.getElementById('e-mascota').value),
            clienteId: parseInt(document.getElementById('e-cliente').value),
            personalId: parseInt(document.getElementById('e-personal').value),
            citaId: citaVal ? parseInt(citaVal) : null,
            tipoExamen: document.getElementById('e-tipo').value,
            urgente: document.getElementById('e-urgente').value === 'true'
        };
        try {
            const res = await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
            if(res.ok){msg.className='ok';msg.textContent='✅ Examen solicitado exitosamente.';cargar();}
            else{msg.className='err';msg.textContent='❌ Error al solicitar.';}
        } catch(e){msg.className='err';msg.textContent='❌ Sin conexión al servidor.';}
    }

    function badgeEstado(e){
        const m={SOLICITADO:'badge',EN_PROCESO:'badge',COMPLETADO:'badge-comp',ENTREGADO:'badge-comp'};
        return `<span class="badge ${m[e]||'badge'}">${e}</span>`;
    }

    async function cargar() {
        const tbody = document.getElementById('tablaExamenes');
        try {
            const data = await (await fetch(API)).json();
            if(!data.length) return;
            tbody.innerHTML = data.map(e=>`<tr>
                <td>${e.id}</td>
                <td>ID: ${e.mascotaId}</td>
                <td><span class="badge">${e.tipoExamen}</span></td>
                <td>${badgeEstado(e.estado)}</td>
                <td>${e.urgente?'<span class="badge badge-urg">⚠️ URGENTE</span>':'No'}</td>
                <td>${e.fechaSolicitud?new Date(e.fechaSolicitud).toLocaleDateString('es-CL'):'-'}</td>
                <td style="font-size:.82rem">${e.resultados?'✅ Disponible':'⏳ Pendiente'}</td>
            </tr>`).join('');
        } catch(e){console.error(e);}
    }
</script>
</body>
</html>
