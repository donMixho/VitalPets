version: '3.8'
services:
  mysql-vitalpets:
    image: mysql:8.0
    container_name: mysql-vitalpets
    environment:
      MYSQL_ROOT_PASSWORD: vitalpets123
      MYSQL_USER: vitalpets
      MYSQL_PASSWORD: vitalpets123
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: