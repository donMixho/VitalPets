<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VitalPets — Gestión de Mascotas</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background-color: #f9fcfb;
        color: #2d2d2d;
      }

      /* ── HEADER ── */
      header {
        background-color: #78c4a7;
        padding: 18px 40px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      header h1 {
        color: #fff;
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: 1px;
      }
      header span {
        font-size: 2rem;
      }

      /* ── CONTENEDOR PRINCIPAL ── */
      main {
        max-width: 960px;
        margin: 36px auto;
        padding: 0 20px;
      }

      /* ── FORMULARIO ── */
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 28px 32px;
        box-shadow: 0 2px 12px rgba(120, 196, 167, 0.15);
        margin-bottom: 32px;
        border-top: 4px solid #78c4a7;
      }
      .card h2 {
        color: #78c4a7;
        margin-bottom: 20px;
        font-size: 1.1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .form-group.full {
        grid-column: span 2;
      }

      label {
        font-size: 0.82rem;
        font-weight: 600;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      input,
      select,
      textarea {
        padding: 10px 14px;
        border: 1.5px solid #ceeadf;
        border-radius: 8px;
        font-size: 0.95rem;
        background: #f9fcfb;
        transition: border-color 0.2s;
        outline: none;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: #78c4a7;
        background: #fff;
      }
      textarea {
        resize: vertical;
        min-height: 72px;
      }

      /* ── BOTONES ── */
      .btn-primary {
        background-color: #78c4a7;
        color: #fff;
        border: none;
        padding: 12px 28px;
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 8px;
      }
      .btn-primary:hover {
        background-color: #5aab8e;
      }

      .btn-danger {
        background-color: #e57373;
        color: #fff;
        border: none;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.82rem;
      }

      /* ── TABLA ── */
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }
      thead tr {
        background-color: #ceeadf;
      }
      thead th {
        padding: 12px 14px;
        text-align: left;
        color: #2d6b55;
        font-weight: 700;
        font-size: 0.78rem;
        text-transform: uppercase;
      }
      tbody tr {
        border-bottom: 1px solid #f4f4f2;
      }
      tbody tr:hover {
        background-color: #f9fcfb;
      }
      tbody td {
        padding: 11px 14px;
      }

      /* ── BADGE ESPECIE ── */
      .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 700;
        background: #ceeadf;
        color: #2d6b55;
      }

      /* ── MENSAJE ── */
      #mensaje {
        padding: 12px 18px;
        border-radius: 8px;
        margin-bottom: 16px;
        display: none;
        font-weight: 600;
      }
      .ok {
        background: #ceeadf;
        color: #2d6b55;
        display: block !important;
      }
      .err {
        background: #fde8e8;
        color: #c0392b;
        display: block !important;
      }
    </style>
  </head>
  <body>
    <header>
      <span>🐾</span>
      <h1>VitalPets — Gestión de Mascotas</h1>
    </header>

    <main>
      <!-- FORMULARIO REGISTRO -->
      <div class="card">
        <h2>➕ Registrar Nueva Mascota</h2>
        <div id="mensaje"></div>
        <div class="form-grid">
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="nombre" placeholder="Ej: Luna" />
          </div>
          <div class="form-group">
            <label>Especie</label>
            <select id="especie">
              <option value="">-- Selecciona --</option>
              <option value="PERRO">🐶 Perro</option>
              <option value="GATO">🐱 Gato</option>
              <option value="AVE">🐦 Ave</option>
              <option value="REPTIL">🦎 Reptil</option>
              <option value="ROEDOR">🐹 Roedor</option>
              <option value="EXOTICO">🦜 Exótico</option>
              <option value="OTRO">❓ Otro</option>
            </select>
          </div>
          <div class="form-group">
            <label>Raza</label>
            <input type="text" id="raza" placeholder="Ej: Labrador" />
          </div>
          <div class="form-group">
            <label>Sexo</label>
            <select id="sexo">
              <option value="MACHO">Macho</option>
              <option value="HEMBRA">Hembra</option>
            </select>
          </div>
          <div class="form-group">
            <label>Edad (años)</label>
            <input type="number" id="edad" min="0" placeholder="Ej: 3" />
          </div>
          <div class="form-group">
            <label>Peso (kg)</label>
            <input type="number" id="peso" step="0.1" placeholder="Ej: 12.5" />
          </div>
          <div class="form-group">
            <label>Color / Pelaje</label>
            <input type="text" id="color" placeholder="Ej: Dorado" />
          </div>
          <div class="form-group">
            <label>ID del Dueño (clienteId)</label>
            <input type="number" id="clienteId" placeholder="Ej: 1" />
          </div>
          <div class="form-group full">
            <label>Notas de especie</label>
            <textarea
              id="notas"
              placeholder="Ej: Requiere temperatura cálida constante"
            ></textarea>
          </div>
        </div>
        <button class="btn-primary" onclick="registrarMascota()">
          Registrar Mascota
        </button>
      </div>

      <!-- TABLA LISTADO -->
      <div class="card">
        <h2>📋 Mascotas Registradas</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Especie</th>
              <th>Raza</th>
              <th>Sexo</th>
              <th>Edad</th>
              <th>Dueño ID</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="tablaMascotas">
            <tr>
              <td
                colspan="8"
                style="text-align: center; color: #aaa; padding: 20px"
              >
                Sin mascotas registradas aún.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <script>
      const API = "http://localhost:8081/api/mascotas";

      // Cargar lista al abrir la página
      window.onload = () => cargarMascotas();

      async function registrarMascota() {
        const msg = document.getElementById("mensaje");
        const body = {
          nombre: document.getElementById("nombre").value,
          especie: document.getElementById("especie").value,
          raza: document.getElementById("raza").value,
          sexo: document.getElementById("sexo").value,
          edadAnios: parseInt(document.getElementById("edad").value),
          pesoKg: parseFloat(document.getElementById("peso").value),
          colorPelaje: document.getElementById("color").value,
          clienteId: parseInt(document.getElementById("clienteId").value),
          notasEspecie: document.getElementById("notas").value,
        };

        try {
          const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (res.ok) {
            msg.className = "ok";
            msg.textContent = "✅ Mascota registrada exitosamente.";
            cargarMascotas();
          } else {
            msg.className = "err";
            msg.textContent = "❌ Error al registrar. Verifica los campos.";
          }
        } catch (e) {
          msg.className = "err";
          msg.textContent = "❌ No se pudo conectar con el servidor.";
        }
      }

      async function cargarMascotas() {
        const tbody = document.getElementById("tablaMascotas");
        try {
          const res = await fetch(API);
          const data = await res.json();
          if (!data.length) return;
          tbody.innerHTML = data
            .map(
              (m) => `
                <tr>
                    <td>${m.id}</td>
                    <td><strong>${m.nombre}</strong></td>
                    <td><span class="badge">${m.especie}</span></td>
                    <td>${m.raza}</td>
                    <td>${m.sexo}</td>
                    <td>${m.edadAnios} año(s)</td>
                    <td>${m.clienteId}</td>
                    <td>
                        <button class="btn-danger"
                            onclick="desactivar(${m.id})">Dar de baja</button>
                    </td>
                </tr>`,
            )
            .join("");
        } catch (e) {
          console.error(e);
        }
      }

      async function desactivar(id) {
        if (!confirm("¿Dar de baja esta mascota?")) return;
        await fetch(`${API}/${id}`, { method: "DELETE" });
        cargarMascotas();
      }
    </script>
  </body>
</html>
