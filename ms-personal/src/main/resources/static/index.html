<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>VitalPets — Personal</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f9fcfb;
        color: #2d2d2d;
      }
      header {
        background: #78c4a7;
        padding: 18px 40px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      header h1 {
        color: #fff;
        font-size: 1.6rem;
        font-weight: 700;
      }
      main {
        max-width: 980px;
        margin: 36px auto;
        padding: 0 20px;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 28px 32px;
        box-shadow: 0 2px 12px rgba(120, 196, 167, 0.15);
        margin-bottom: 32px;
        border-top: 4px solid #78c4a7;
      }
      .card h2 {
        color: #78c4a7;
        margin-bottom: 20px;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .form-group.full {
        grid-column: span 2;
      }
      label {
        font-size: 0.82rem;
        font-weight: 600;
        color: #555;
        text-transform: uppercase;
      }
      input,
      select,
      textarea {
        padding: 10px 14px;
        border: 1.5px solid #ceeadf;
        border-radius: 8px;
        font-size: 0.95rem;
        background: #f9fcfb;
        outline: none;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: #78c4a7;
        background: #fff;
      }
      textarea {
        resize: vertical;
        min-height: 68px;
      }
      .btn {
        background: #78c4a7;
        color: #fff;
        border: none;
        padding: 12px 28px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
      }
      .btn:hover {
        background: #5aab8e;
      }
      .btn-danger {
        background: #e57373;
        color: #fff;
        border: none;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.82rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88rem;
      }
      thead tr {
        background: #ceeadf;
      }
      thead th {
        padding: 12px 14px;
        text-align: left;
        color: #2d6b55;
        font-size: 0.78rem;
        text-transform: uppercase;
      }
      tbody tr {
        border-bottom: 1px solid #f4f4f2;
      }
      tbody td {
        padding: 11px 14px;
      }
      .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 700;
        background: #ceeadf;
        color: #2d6b55;
      }
      #msg {
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 12px;
        display: none;
      }
      .ok {
        background: #ceeadf;
        color: #2d6b55;
        display: block !important;
      }
      .err {
        background: #fde8e8;
        color: #c0392b;
        display: block !important;
      }
    </style>
  </head>
  <body>
    <header>
      <span>👨‍⚕️</span>
      <h1>VitalPets — Gestión de Personal</h1>
    </header>
    <main>
      <div class="card">
        <h2>➕ Registrar Personal</h2>
        <div id="msg"></div>
        <div class="form-grid">
          <div class="form-group">
            <label>Nombre</label
            ><input id="p-nombre" placeholder="Ej: Carlos" />
          </div>
          <div class="form-group">
            <label>Apellido</label
            ><input id="p-apellido" placeholder="Ej: Mendoza" />
          </div>
          <div class="form-group">
            <label>RUT</label><input id="p-rut" placeholder="Ej: 15234567-8" />
          </div>
          <div class="form-group">
            <label>Teléfono</label
            ><input id="p-tel" placeholder="Ej: +56912345678" />
          </div>
          <div class="form-group">
            <label>Email</label
            ><input id="p-email" placeholder="Ej: carlos@vitalpets.cl" />
          </div>
          <div class="form-group">
            <label>Profesión</label
            ><input id="p-profesion" placeholder="Ej: Médico Veterinario" />
          </div>
          <div class="form-group full">
            <label>Especialidad</label>
            <select id="p-especialidad">
              <option value="VETERINARIO_GENERAL">Veterinario General</option>
              <option value="VETERINARIO_EXOTICOS">Veterinario Exóticos</option>
              <option value="CIRUJANO">Cirujano</option>
              <option value="ESTILISTA_CANINO">Estilista Canino</option>
              <option value="ESTILISTA_FELINO">Estilista Felino</option>
              <option value="LABORATORISTA">Laboratorista</option>
              <option value="RECEPCIONISTA">Recepcionista</option>
              <option value="ADMINISTRATIVO">Administrativo</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Implementos Asignados</label>
            <textarea
              id="p-implementos"
              placeholder="Ej: Guantes nitrilo, mascarilla N95, gafas protectoras"
            ></textarea>
          </div>
        </div>
        <button class="btn" onclick="registrar()">Registrar Personal</button>
      </div>
      <div class="card">
        <h2>📋 Personal Registrado</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Profesión</th>
              <th>Especialidad</th>
              <th>Implementos</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="tablaPersonal">
            <tr>
              <td
                colspan="6"
                style="text-align: center; color: #aaa; padding: 20px"
              >
                Sin registros.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
    <script>
      const API = "http://localhost:8087/api/personal";
      window.onload = () => cargar();

      async function registrar() {
        const msg = document.getElementById("msg");
        const body = {
          nombre: document.getElementById("p-nombre").value,
          apellido: document.getElementById("p-apellido").value,
          rut: document.getElementById("p-rut").value,
          telefono: document.getElementById("p-tel").value,
          email: document.getElementById("p-email").value,
          profesion: document.getElementById("p-profesion").value,
          especialidad: document.getElementById("p-especialidad").value,
          implementosAsignados: document.getElementById("p-implementos").value,
        };
        try {
          const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (res.ok) {
            msg.className = "ok";
            msg.textContent = "✅ Personal registrado exitosamente.";
            cargar();
          } else {
            msg.className = "err";
            msg.textContent = "❌ Error al registrar. Verifica los campos.";
          }
        } catch (e) {
          msg.className = "err";
          msg.textContent = "❌ Sin conexión al servidor.";
        }
      }

      async function cargar() {
        const tbody = document.getElementById("tablaPersonal");
        try {
          const data = await (await fetch(API)).json();
          if (!data.length) return;
          tbody.innerHTML = data
            .map(
              (p) => `<tr>
                <td>${p.id}</td>
                <td><strong>${p.nombre} ${p.apellido}</strong></td>
                <td>${p.profesion}</td>
                <td><span class="badge">${p.especialidad}</span></td>
                <td style="font-size:.82rem">${p.implementosAsignados || "-"}</td>
                <td><button class="btn-danger" onclick="desactivar(${p.id})">Dar de baja</button></td>
            </tr>`,
            )
            .join("");
        } catch (e) {
          console.error(e);
        }
      }

      async function desactivar(id) {
        if (!confirm("¿Dar de baja este trabajador?")) return;
        await fetch(`${API}/${id}`, { method: "DELETE" });
        cargar();
      }
    </script>
  </body>
</html>
